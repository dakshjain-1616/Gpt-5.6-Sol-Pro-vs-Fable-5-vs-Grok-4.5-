  width: 1600
  height: 1600
  congestion_scale:
  - 0.0
  - 100.0
  queue_scale:
  - 0.0
  - 40.0
  wait_scale:
  - 0.0
  - 180.0
  gridlock_scale:
  - 0.0
  - 100.0
