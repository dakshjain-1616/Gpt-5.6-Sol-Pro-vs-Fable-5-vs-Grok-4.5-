        - strong [ref=f2e202]: The two runs independently agree on what is hard.
        - text: "Partial signal failure is the worst scenario for both (4.8× / 4.5×), missing sensors is second (4.3× / 3.1×), and road closure and uneven demand are close to free for both (0.95–1.23×). Two different algorithms on two different simulators converging on the same ranking is a far stronger result than either run's absolute numbers. Fable degrades harder throughout — consistent with SUMO's stricter dynamics and its four-phase control problem. Note also that the scenarios share names but not severities: Fable's signal failure kills 4 of 16 intersections, Grok's sticks 2 on north–south."
