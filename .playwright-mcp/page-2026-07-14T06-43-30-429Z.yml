      - listitem [ref=f2e289]:
        - strong [ref=f2e290]: Different simulators.
        - text: SUMO's car-following against a hand-rolled Python micro-sim. No raw metric from one is on the same axis as the other.
      - listitem [ref=f2e291]:
        - strong [ref=f2e292]: Different episode lengths and decision intervals.
        - text: 1800 s at 5 s decisions versus 360 steps at 1 s. Waiting and travel times are both bounded by the episode they were measured in.
      - listitem [ref=f2e293]:
        - strong [ref=f2e294]: Different action spaces.
        - text: Fable chooses among 4 phases, Grok among 2. Grok is solving a strictly easier control problem, which is also why its network is a third of the size.
      - listitem [ref=f2e295]:
        - strong [ref=f2e296]: Scenario names match; severities do not.
        - text: Fable's high demand is 1.8× base traffic, Grok's is 2.25×. So even the degradation ratios measure brittleness to
        - emphasis [ref=f2e297]: each run's own version
        - text: of a stress, not to an identical shock.
      - listitem [ref=f2e298]:
        - strong [ref=f2e299]: One of Grok's numbers looks like an improvement and is not.
        - text: Its travel time under signal failure (72.3 s) falls
        - emphasis [ref=f2e300]: below
        - text: "its own normal (85.4 s) while waiting time rises 4.5× and completed trips drop 15%. That is completion bias inside a fixed-length episode: the long trips that would have raised the average simply never finish. It is not charted here, and it should not be reported as a win."
